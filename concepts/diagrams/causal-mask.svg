<svg xmlns="http://www.w3.org/2000/svg" viewBox="80 -80 820 401" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="concept-causal-mask">
<style>
.aups-node { cursor: default; }
.aups-label {
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 12px;
  font-weight: 600;
  dominant-baseline: central;
  text-anchor: middle;
  pointer-events: none;
  letter-spacing: 0.01em;
}
.aups-sublabel {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  font-size: 10px;
  dominant-baseline: central;
  text-anchor: middle;
  fill: rgba(255,255,255,0.75);
  pointer-events: none;
}
.aups-edge { fill: none; }
.aups-animated { stroke-dasharray: 8 4; animation: aups-flow 0.9s linear infinite; }
.aups-dash-flow { stroke-dasharray: 18 8; animation: aups-dash-flow 1.1s linear infinite; }
.aups-pulse { animation: aups-pulse 2.5s ease-in-out infinite; }
.aups-fade { animation: aups-fade 1.8s ease-in-out infinite; }
.aups-edge-label {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  font-size: 10px;
  font-weight: 500;
  text-anchor: middle;
  dominant-baseline: central;
}
.aups-swimlane-label {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  fill: rgba(0,0,0,0.45);
  dominant-baseline: central;
}
/* Semantic edge styles */
.aups-edge-sync { stroke-width: 2; }
.aups-edge-async { stroke-dasharray: 8 4; stroke-width: 2; }
.aups-edge-data-flow { stroke-dasharray: 3 3; stroke-width: 1.5; }
.aups-edge-monitoring { stroke-dasharray: 8 3 2 3; stroke-width: 1; opacity: 0.6; }
.aups-edge-event { stroke-dasharray: 5 5; stroke-width: 2; }
/* Legend styles */
.aups-legend {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
}
.aups-legend-title {
  font-size: 11px; font-weight: 700; fill: #475569;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.aups-legend-text {
  font-size: 10px; fill: #64748B;
}
/* Tooltip styles */
.aups-tooltip {
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}
.aups-tooltip.visible {
  opacity: 1;
}

@keyframes aups-flow {
  to { stroke-dashoffset: -24; }
}
@keyframes aups-dash-flow {
  to { stroke-dashoffset: -40; }
}
@keyframes aups-pulse {
  0%, 100% { filter: drop-shadow(0 0 4px currentColor); opacity: 1; }
  50% { filter: drop-shadow(0 0 12px currentColor); opacity: 0.85; }
}
@keyframes aups-fade {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}
@media (prefers-reduced-motion: reduce) {
  .aups-animated, .aups-dash-flow, .aups-pulse, .aups-fade,
  .aups-dot { animation: none !important; }
}

@media (prefers-color-scheme: dark) {
  .aups-bg { fill: #1a1a2e !important; }
  .aups-title { fill: #e2e8f0 !important; }
  .aups-label { fill: #f1f5f9 !important; }
  .aups-sublabel { fill: rgba(241,245,249,0.7) !important; }
  .aups-edge-label { fill: #f1f5f9 !important; }
  .aups-edge-pill { fill: #334155 !important; }
  .aups-swimlane-label { fill: rgba(255,255,255,0.35) !important; }
  .aups-swimlane-band { opacity: 0.15 !important; }
  .aups-legend-title { fill: #94a3b8 !important; }
  .aups-legend-text { fill: #94a3b8 !important; }
  .aups-legend-bg { fill: #1e293b !important; stroke: #334155 !important; }
}
</style>
<defs><filter id="node-shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.10)"/></filter><linearGradient id="grad-0" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c7faf0"/><stop offset="100%" stop-color="#99F6E4"/></linearGradient><marker id="arrowhead-0" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><polygon points="0 0, 8 3, 0 6" fill="#64748B"/></marker></defs>
<rect class="aups-bg" x="80" y="-80" width="820" height="401" fill="#F0F4F8" rx="0"/>
<text class="aups-title" x="460" y="-52" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="18" font-weight="700" fill="#1E293B" text-anchor="middle" letter-spacing="-0.02em">concept-causal-mask</text>

<g class="aups-edges"><path class="aups-edge " d="M220,60 C220,30 220,30 220,0" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)"/><path id="path-e-3dd5b032-106a-4df2-bceb-b36e405d46df" class="aups-edge aups-animated" d="M220,60 C220,30 380,30 380,0" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)" opacity="0.85"/><circle r="3" fill="#64748B" opacity="0.8"><animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto"><mpath href="#path-e-3dd5b032-106a-4df2-bceb-b36e405d46df"/></animateMotion></circle><path class="aups-edge " d="M380,60 C380,30 380,30 380,0" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)"/><path id="path-e-5d9babaf-2cc5-47d2-aef3-50cc33a5c6f8" class="aups-edge aups-animated" d="M220,60 C220,30 540,30 540,0" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)" opacity="0.85"/><circle r="3" fill="#64748B" opacity="0.8"><animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto"><mpath href="#path-e-5d9babaf-2cc5-47d2-aef3-50cc33a5c6f8"/></animateMotion></circle><path id="path-e-237af866-c77f-4918-80ac-56f5d1e028f3" class="aups-edge aups-animated" d="M380,60 C380,30 540,30 540,0" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)" opacity="0.85"/><circle r="3" fill="#64748B" opacity="0.8"><animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto"><mpath href="#path-e-237af866-c77f-4918-80ac-56f5d1e028f3"/></animateMotion></circle><path class="aups-edge " d="M540,60 C540,30 540,30 540,0" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)"/></g>
<g class="aups-nodes"><g class="aups-node"><rect x="160" y="0" width="120" height="60" rx="14" ry="14" fill="url(#grad-0)" stroke="#0D9488" stroke-width="1" filter="url(#node-shadow)"/><text class="aups-label" x="220" y="30" fill="#134E4A"><tspan x="220" dy="0">&quot;To&quot;</tspan></text></g><g class="aups-node"><rect x="320" y="0" width="120" height="60" rx="14" ry="14" fill="url(#grad-0)" stroke="#0D9488" stroke-width="1" filter="url(#node-shadow)"/><text class="aups-label" x="380" y="30" fill="#134E4A"><tspan x="380" dy="0">&quot;be&quot;</tspan></text></g><g class="aups-node"><rect x="480" y="0" width="120" height="60" rx="14" ry="14" fill="url(#grad-0)" stroke="#0D9488" stroke-width="1" filter="url(#node-shadow)"/><text class="aups-label" x="540" y="30" fill="#134E4A"><tspan x="540" dy="0">&quot;?&quot;</tspan></text></g><g class="aups-node"><rect x="640" y="0" width="120" height="60" rx="14" ry="14" fill="url(#grad-0)" stroke="#0D9488" stroke-width="1" filter="url(#node-shadow)"/><text class="aups-label" x="700" y="30" fill="#134E4A"><tspan x="700" dy="0">(future)</tspan></text></g></g>
</svg>