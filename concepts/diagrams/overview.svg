<svg xmlns="http://www.w3.org/2000/svg" viewBox="-160 -80 440 1361" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="transformer-concepts-overview">
<style>
.aups-node { cursor: default; }
.aups-label {
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 12px;
  font-weight: 600;
  dominant-baseline: central;
  text-anchor: middle;
  pointer-events: none;
  letter-spacing: 0.01em;
}
.aups-sublabel {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  font-size: 10px;
  dominant-baseline: central;
  text-anchor: middle;
  fill: rgba(255,255,255,0.75);
  pointer-events: none;
}
.aups-edge { fill: none; }
.aups-animated { stroke-dasharray: 8 4; animation: aups-flow 0.9s linear infinite; }
.aups-dash-flow { stroke-dasharray: 18 8; animation: aups-dash-flow 1.1s linear infinite; }
.aups-pulse { animation: aups-pulse 2.5s ease-in-out infinite; }
.aups-fade { animation: aups-fade 1.8s ease-in-out infinite; }
.aups-edge-label {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  font-size: 10px;
  font-weight: 500;
  text-anchor: middle;
  dominant-baseline: central;
}
.aups-swimlane-label {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  fill: rgba(0,0,0,0.45);
  dominant-baseline: central;
}
/* Semantic edge styles */
.aups-edge-sync { stroke-width: 2; }
.aups-edge-async { stroke-dasharray: 8 4; stroke-width: 2; }
.aups-edge-data-flow { stroke-dasharray: 3 3; stroke-width: 1.5; }
.aups-edge-monitoring { stroke-dasharray: 8 3 2 3; stroke-width: 1; opacity: 0.6; }
.aups-edge-event { stroke-dasharray: 5 5; stroke-width: 2; }
/* Legend styles */
.aups-legend {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
}
.aups-legend-title {
  font-size: 11px; font-weight: 700; fill: #475569;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.aups-legend-text {
  font-size: 10px; fill: #64748B;
}
/* Tooltip styles */
.aups-tooltip {
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}
.aups-tooltip.visible {
  opacity: 1;
}

@keyframes aups-flow {
  to { stroke-dashoffset: -24; }
}
@keyframes aups-dash-flow {
  to { stroke-dashoffset: -40; }
}
@keyframes aups-pulse {
  0%, 100% { filter: drop-shadow(0 0 4px currentColor); opacity: 1; }
  50% { filter: drop-shadow(0 0 12px currentColor); opacity: 0.85; }
}
@keyframes aups-fade {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}
@media (prefers-reduced-motion: reduce) {
  .aups-animated, .aups-dash-flow, .aups-pulse, .aups-fade,
  .aups-dot { animation: none !important; }
}

@media (prefers-color-scheme: dark) {
  .aups-bg { fill: #1a1a2e !important; }
  .aups-title { fill: #e2e8f0 !important; }
  .aups-label { fill: #f1f5f9 !important; }
  .aups-sublabel { fill: rgba(241,245,249,0.7) !important; }
  .aups-edge-label { fill: #f1f5f9 !important; }
  .aups-edge-pill { fill: #334155 !important; }
  .aups-swimlane-label { fill: rgba(255,255,255,0.35) !important; }
  .aups-swimlane-band { opacity: 0.15 !important; }
  .aups-legend-title { fill: #94a3b8 !important; }
  .aups-legend-text { fill: #94a3b8 !important; }
  .aups-legend-bg { fill: #1e293b !important; stroke: #334155 !important; }
}
</style>
<defs><filter id="node-shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.10)"/></filter><linearGradient id="grad-0" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c7faf0"/><stop offset="100%" stop-color="#99F6E4"/></linearGradient><linearGradient id="grad-1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ece8fe"/><stop offset="100%" stop-color="#DDD6FE"/></linearGradient><marker id="arrowhead-0" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><polygon points="0 0, 8 3, 0 6" fill="#64748B"/></marker></defs>
<rect class="aups-bg" x="-160" y="-80" width="440" height="1361" fill="#F0F4F8" rx="0"/>
<text class="aups-title" x="60" y="-52" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="18" font-weight="700" fill="#1E293B" text-anchor="middle" letter-spacing="-0.02em">transformer-concepts-overview</text>

<g class="aups-edges"><path id="path-e-f072b90d-9821-4dcd-9580-8722bf587a70" class="aups-edge aups-animated" d="M60,60 C60,110 60,110 60,160" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)" opacity="0.85"/><circle r="3" fill="#64748B" opacity="0.8"><animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto"><mpath href="#path-e-f072b90d-9821-4dcd-9580-8722bf587a70"/></animateMotion></circle><path id="path-e-604977f1-bd11-4791-9185-0795473d5b38" class="aups-edge aups-animated" d="M60,220 C60,270 60,270 60,320" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)" opacity="0.85"/><circle r="3" fill="#64748B" opacity="0.8"><animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto"><mpath href="#path-e-604977f1-bd11-4791-9185-0795473d5b38"/></animateMotion></circle><path id="path-e-6ef46873-e520-47a7-9eb3-af5a2b1b3974" class="aups-edge aups-animated" d="M60,380 C60,670 -20,670 -20,960" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)" opacity="0.85"/><circle r="3" fill="#64748B" opacity="0.8"><animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto"><mpath href="#path-e-6ef46873-e520-47a7-9eb3-af5a2b1b3974"/></animateMotion></circle><path id="path-e-4f1dd2e6-9948-4d99-8212-db9ab49a12e8" class="aups-edge aups-animated" d="M-20,1020 C-20,830 60,830 60,640" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)" opacity="0.85"/><circle r="3" fill="#64748B" opacity="0.8"><animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto"><mpath href="#path-e-4f1dd2e6-9948-4d99-8212-db9ab49a12e8"/></animateMotion></circle><path id="path-e-6d2c1aac-cc35-4ac7-8d57-13f4614fec14" class="aups-edge aups-animated" d="M60,700 C60,750 60,750 60,800" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)" opacity="0.85"/><circle r="3" fill="#64748B" opacity="0.8"><animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto"><mpath href="#path-e-6d2c1aac-cc35-4ac7-8d57-13f4614fec14"/></animateMotion></circle><path id="path-e-3bfd0a3d-3a0a-4087-bd86-2781faa2a13b" class="aups-edge aups-animated" d="M60,860 C60,910 -20,910 -20,960" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)" opacity="0.85"/><circle r="3" fill="#64748B" opacity="0.8"><animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto"><mpath href="#path-e-3bfd0a3d-3a0a-4087-bd86-2781faa2a13b"/></animateMotion></circle><rect class="aups-edge-pill" x="-29.25" y="900" width="98.5" height="18" rx="9" fill="#1E293B" opacity="0.82"/><text class="aups-edge-label" x="20" y="911" fill="#F8FAFC">stack N times</text><path id="path-e-40ec58d0-1e36-4f9f-9151-044d69f84d66" class="aups-edge aups-animated" d="M60,860 C60,910 140,910 140,960" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrowhead-0)" opacity="0.85"/><circle r="3" fill="#64748B" opacity="0.8"><animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto"><mpath href="#path-e-40ec58d0-1e36-4f9f-9151-044d69f84d66"/></animateMotion></circle></g>
<g class="aups-nodes"><g class="aups-node"><rect x="0" y="0" width="120" height="60" rx="14" ry="14" fill="url(#grad-0)" stroke="#0D9488" stroke-width="1" filter="url(#node-shadow)"/><text class="aups-label" x="60" y="30" fill="#134E4A"><tspan x="60" dy="0">Raw text</tspan></text></g><g class="aups-node"><rect x="0" y="160" width="120" height="60" rx="14" ry="14" fill="url(#grad-0)" stroke="#0D9488" stroke-width="1" filter="url(#node-shadow)"/><text class="aups-label" x="60" y="190" fill="#134E4A"><tspan x="60" dy="0">Tokenization</tspan></text></g><g class="aups-node"><rect x="0" y="320" width="120" height="60" rx="14" ry="14" fill="url(#grad-0)" stroke="#0D9488" stroke-width="1" filter="url(#node-shadow)"/><text class="aups-label" x="60" y="350" fill="#134E4A"><tspan x="60" dy="0">Embeddings</tspan></text></g><g class="aups-node"><rect x="-80" y="960" width="120" height="60" rx="14" ry="14" fill="url(#grad-0)" stroke="#0D9488" stroke-width="1" filter="url(#node-shadow)"/><text class="aups-label" x="-20" y="990" fill="#134E4A"><tspan x="-20" dy="0">Attention</tspan></text></g><g class="aups-node"><rect x="0" y="640" width="120" height="60" rx="14" ry="14" fill="url(#grad-0)" stroke="#0D9488" stroke-width="1" filter="url(#node-shadow)"/><text class="aups-label" x="60" y="670" fill="#134E4A"><tspan x="60" dy="0">Feed-Forward</tspan></text></g><g class="aups-node"><polygon points="60,800 120,830 60,860 0,830" fill="url(#grad-1)" stroke="#7C3AED" stroke-width="1" filter="url(#node-shadow)"/><text class="aups-label" x="60" y="830" fill="#3B0764"><tspan x="60" dy="0">One block</tspan></text></g><g class="aups-node"><rect x="80" y="960" width="120" height="60" rx="14" ry="14" fill="url(#grad-0)" stroke="#0D9488" stroke-width="1" filter="url(#node-shadow)"/><text class="aups-label" x="140" y="982.5" fill="#134E4A"><tspan x="140" dy="0">Next-token</tspan><tspan x="140" dy="15">prediction</tspan></text></g></g>
</svg>