<svg xmlns="http://www.w3.org/2000/svg" viewBox="-240 -80 600 1140" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="transformer-attention-flow">
<style>
.aups-node { cursor: default; }
.aups-label {
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 12px;
  font-weight: 600;
  dominant-baseline: central;
  text-anchor: middle;
  pointer-events: none;
  letter-spacing: 0.01em;
}
.aups-sublabel {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  font-size: 10px;
  dominant-baseline: central;
  text-anchor: middle;
  fill: rgba(255,255,255,0.75);
  pointer-events: none;
}
.aups-edge { fill: none; }
.aups-animated { stroke-dasharray: 8 4; animation: aups-flow 0.9s linear infinite; }
.aups-dash-flow { stroke-dasharray: 18 8; animation: aups-dash-flow 1.1s linear infinite; }
.aups-pulse { animation: aups-pulse 2.5s ease-in-out infinite; }
.aups-fade { animation: aups-fade 1.8s ease-in-out infinite; }
.aups-edge-label {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  font-size: 10px;
  font-weight: 500;
  text-anchor: middle;
  dominant-baseline: central;
}
.aups-swimlane-label {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  fill: rgba(0,0,0,0.45);
  dominant-baseline: central;
}
/* Semantic edge styles */
.aups-edge-sync { stroke-width: 2; }
.aups-edge-async { stroke-dasharray: 8 4; stroke-width: 2; }
.aups-edge-data-flow { stroke-dasharray: 3 3; stroke-width: 1.5; }
.aups-edge-monitoring { stroke-dasharray: 8 3 2 3; stroke-width: 1; opacity: 0.6; }
.aups-edge-event { stroke-dasharray: 5 5; stroke-width: 2; }
/* Legend styles */
.aups-legend {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
}
.aups-legend-title {
  font-size: 11px; font-weight: 700; fill: #475569;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.aups-legend-text {
  font-size: 10px; fill: #64748B;
}
/* Tooltip styles */
.aups-tooltip {
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}
.aups-tooltip.visible {
  opacity: 1;
}

@keyframes aups-flow {
  to { stroke-dashoffset: -24; }
}
@keyframes aups-dash-flow {
  to { stroke-dashoffset: -40; }
}
@keyframes aups-pulse {
  0%, 100% { filter: drop-shadow(0 0 4px currentColor); opacity: 1; }
  50% { filter: drop-shadow(0 0 12px currentColor); opacity: 0.85; }
}
@keyframes aups-fade {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}
@media (prefers-reduced-motion: reduce) {
  .aups-animated, .aups-dash-flow, .aups-pulse, .aups-fade,
  .aups-dot { animation: none !important; }
}

@media (prefers-color-scheme: dark) {
  .aups-bg { fill: #1a1a2e !important; }
  .aups-title { fill: #e2e8f0 !important; }
  .aups-label { fill: #f1f5f9 !important; }
  .aups-sublabel { fill: rgba(241,245,249,0.7) !important; }
  .aups-edge-label { fill: #f1f5f9 !important; }
  .aups-edge-pill { fill: #334155 !important; }
  .aups-swimlane-label { fill: rgba(255,255,255,0.35) !important; }
  .aups-swimlane-band { opacity: 0.15 !important; }
  .aups-legend-title { fill: #94a3b8 !important; }
  .aups-legend-text { fill: #94a3b8 !important; }
  .aups-legend-bg { fill: #1e293b !important; stroke: #334155 !important; }
}
</style>
<defs><filter id="node-shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.10)"/></filter><linearGradient id="grad-0" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dcebfe"/><stop offset="100%" stop-color="#BFDBFE"/></linearGradient><linearGradient id="grad-1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c7faf0"/><stop offset="100%" stop-color="#99F6E4"/></linearGradient><linearGradient id="grad-2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ece8fe"/><stop offset="100%" stop-color="#DDD6FE"/></linearGradient><marker id="arrowhead-0" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><polygon points="0 0, 8 3, 0 6" fill="#64748B"/></marker></defs>
<rect class="aups-bg" x="-240" y="-80" width="600" height="1140" fill="#F0F4F8" rx="0"/>
<text class="aups-title" x="60" y="-52" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="18" font-weight="700" fill="#1E293B" text-anchor="middle" letter-spacing="-0.02em">transformer-attention-flow</text>

